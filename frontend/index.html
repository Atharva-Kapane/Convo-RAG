<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ConvoRAG — Conversation AI</title>

  <!-- Google Fonts: Playfair Display (header) + DM Sans (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <!-- ═══════════════════════════════════════════
       STYLES
  ═══════════════════════════════════════════ -->
  <style>
    /* ─── CSS Variables ─── */
    :root {
      --bg-deep:        #080c18;
      --bg-mid:         #0d1225;
      --bg-card:        rgba(255, 255, 255, 0.042);
      --glass-border:   rgba(255, 255, 255, 0.08);
      --glass-blur:     18px;

      --accent-gold:    #e8a87c;
      --accent-amber:   #f5c27a;
      --accent-coral:   #e07a5f;
      --accent-glow:    rgba(232, 168, 124, 0.18);

      --user-bubble-a:  #e07a5f;
      --user-bubble-b:  #c85e8a;
      --bot-bubble:     rgba(255, 255, 255, 0.055);

      --text-primary:   #f0ece4;
      --text-secondary: rgba(240, 236, 228, 0.55);
      --text-muted:     rgba(240, 236, 228, 0.3);

      --radius-bubble:  18px;
      --radius-input:   14px;
      --shadow-soft:    0 8px 32px rgba(0, 0, 0, 0.45);
      --shadow-glow:    0 0 40px rgba(232, 168, 124, 0.12);
      --transition:     0.22s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ─── Reset & Base ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      background: var(--bg-deep);
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      position: relative;
    }

    /* ─── Animated Background ─── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(92, 58, 140, 0.22) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 90%, rgba(192, 80, 80, 0.14) 0%, transparent 55%),
        radial-gradient(ellipse 50% 40% at 60% 40%, rgba(60, 100, 180, 0.10) 0%, transparent 60%),
        var(--bg-deep);
      animation: bgShift 18s ease-in-out infinite alternate;
    }

    @keyframes bgShift {
      0%   { opacity: 1; }
      50%  {
        background:
          radial-gradient(ellipse 80% 60% at 30% 20%, rgba(92, 58, 140, 0.28) 0%, transparent 60%),
          radial-gradient(ellipse 60% 50% at 70% 80%, rgba(192, 80, 80, 0.18) 0%, transparent 55%),
          radial-gradient(ellipse 50% 40% at 50% 50%, rgba(60, 100, 180, 0.14) 0%, transparent 60%),
          var(--bg-deep);
      }
      100% { opacity: 1; }
    }

    /* Subtle noise grain overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
      background-size: 180px 180px;
    }

    /* ─── Layout Wrappers ─── */
    #app {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      height: 100dvh;
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* ═══════════════════════════════════════════
       HEADER
    ═══════════════════════════════════════════ */
    header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 10px 16px;
      border-bottom: 1px solid var(--glass-border);
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-mark {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--user-bubble-a), var(--user-bubble-b));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      box-shadow: 0 4px 16px rgba(224, 122, 95, 0.4);
      flex-shrink: 0;
    }

    .brand-title {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.3px;
      background: linear-gradient(120deg, var(--text-primary) 60%, var(--accent-gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .brand-subtitle {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .header-status {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      color: var(--text-secondary);
      font-weight: 500;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #5cb88a;
      box-shadow: 0 0 8px rgba(92, 184, 138, 0.6);
      animation: pulse 2.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.6; transform: scale(0.85); }
    }

    /* ═══════════════════════════════════════════
       CHAT CONTAINER
    ═══════════════════════════════════════════ */
    #chat-window {
      flex: 1;
      overflow-y: auto;
      padding: 24px 0 12px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    /* Custom scrollbar */
    #chat-window::-webkit-scrollbar { width: 4px; }
    #chat-window::-webkit-scrollbar-track { background: transparent; }
    #chat-window::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.12);
      border-radius: 4px;
    }
    #chat-window::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.22); }

    /* ─── Empty State ─── */
    #empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 16px;
      text-align: center;
      padding: 48px 24px;
      animation: fadeUp 0.7s ease both;
    }

    .empty-orb {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--user-bubble-a), var(--user-bubble-b));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      box-shadow:
        0 0 0 12px rgba(224, 122, 95, 0.08),
        0 0 0 24px rgba(224, 122, 95, 0.04),
        var(--shadow-soft);
      animation: orbFloat 4s ease-in-out infinite;
    }

    @keyframes orbFloat {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-8px); }
    }

    #empty-state h2 {
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.3;
    }

    #empty-state p {
      font-size: 14px;
      color: var(--text-secondary);
      max-width: 300px;
      line-height: 1.6;
    }

    .suggestion-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 8px;
    }

    .chip {
      padding: 8px 16px;
      background: var(--bg-card);
      border: 1px solid var(--glass-border);
      border-radius: 999px;
      font-size: 13px;
      color: var(--text-secondary);
      cursor: pointer;
      backdrop-filter: blur(var(--glass-blur));
      transition: var(--transition);
      transition-property: background, border-color, color, transform;
    }

    .chip:hover {
      background: rgba(232, 168, 124, 0.1);
      border-color: rgba(232, 168, 124, 0.3);
      color: var(--accent-gold);
      transform: translateY(-1px);
    }

    /* ─── Message Rows ─── */
    .message-row {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      animation: fadeUp 0.35s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message-row.user  { flex-direction: row-reverse; }
    .message-row.bot   { flex-direction: row; }

    /* Avatar */
    .avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
    }

    .avatar.user-avatar {
      background: linear-gradient(135deg, var(--user-bubble-a), var(--user-bubble-b));
      box-shadow: 0 2px 10px rgba(224, 122, 95, 0.35);
    }

    .avatar.bot-avatar {
      background: var(--bg-card);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(var(--glass-blur));
    }

    /* Bubble */
    .bubble {
      max-width: min(75%, 800px);
      padding: 12px 16px;
      border-radius: var(--radius-bubble);
      font-size: 14.5px;
      line-height: 1.65;
      font-weight: 400;
      word-break: break-word;
      position: relative;
    }

    .message-row.user .bubble {
      background: linear-gradient(135deg, var(--user-bubble-a) 0%, var(--user-bubble-b) 100%);
      color: #fff;
      border-bottom-right-radius: 5px;
      box-shadow: 0 4px 20px rgba(200, 94, 138, 0.28);
    }

    .message-row.bot .bubble {
      background: var(--bot-bubble);
      color: var(--text-primary);
      border: 1px solid var(--glass-border);
      border-bottom-left-radius: 5px;
      backdrop-filter: blur(var(--glass-blur));
      box-shadow: var(--shadow-soft);
    }

    /* Timestamp */
    .timestamp {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 5px;
      text-align: right;
      padding: 0 4px;
    }

    .message-row.bot .timestamp { text-align: left; }

    .bubble-wrap {
      display: flex;
      flex-direction: column;
    }

    .message-row.user .bubble-wrap { align-items: flex-end; }
    .message-row.bot  .bubble-wrap { align-items: flex-start; }

    /* ─── Typing Indicator ─── */
    #typing-row {
      display: none; /* shown via JS */
      align-items: flex-end;
      gap: 10px;
      animation: fadeUp 0.3s ease both;
    }

    .typing-bubble {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 14px 18px;
      background: var(--bot-bubble);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-bubble);
      border-bottom-left-radius: 5px;
      backdrop-filter: blur(var(--glass-blur));
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-secondary);
      animation: dotBounce 1.3s ease-in-out infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.18s; }
    .dot:nth-child(3) { animation-delay: 0.36s; }

    @keyframes dotBounce {
      0%, 60%, 100% { transform: translateY(0);   opacity: 0.5; }
      30%            { transform: translateY(-7px); opacity: 1;   }
    }

    /* ═══════════════════════════════════════════
       INPUT AREA
    ═══════════════════════════════════════════ */
    #input-area {
      flex-shrink: 0;
      padding: 14px 0 20px;
    }

    .input-glass {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      background: rgba(255, 255, 255, 0.055);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 10px 10px 10px 18px;
      backdrop-filter: blur(var(--glass-blur));
      box-shadow: var(--shadow-soft), inset 0 1px 0 rgba(255,255,255,0.06);
      transition: border-color var(--transition), box-shadow var(--transition);
    }

    .input-glass:focus-within {
      border-color: rgba(232, 168, 124, 0.35);
      box-shadow: var(--shadow-soft), 0 0 0 3px rgba(232, 168, 124, 0.08), inset 0 1px 0 rgba(255,255,255,0.06);
    }

    #user-input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 14.5px;
      font-weight: 400;
      color: var(--text-primary);
      resize: none;
      max-height: 140px;
      line-height: 1.55;
      padding: 4px 0;
      caret-color: var(--accent-gold);
    }

    #user-input::placeholder { color: var(--text-muted); }

    #send-btn {
      width: 40px;
      height: 40px;
      border-radius: 11px;
      border: none;
      cursor: pointer;
      background: linear-gradient(135deg, var(--user-bubble-a), var(--user-bubble-b));
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: var(--transition);
      transition-property: transform, box-shadow, opacity, background;
      box-shadow: 0 4px 16px rgba(224, 122, 95, 0.4);
    }

    #send-btn:hover:not(:disabled) {
      transform: translateY(-1px) scale(1.04);
      box-shadow: 0 6px 22px rgba(224, 122, 95, 0.55);
    }

    #send-btn:active:not(:disabled) {
      transform: translateY(0) scale(0.97);
    }

    #send-btn:disabled {
      opacity: 0.38;
      cursor: default;
      box-shadow: none;
    }

    #send-btn svg {
      width: 17px;
      height: 17px;
      transition: transform var(--transition);
    }

    #send-btn:hover:not(:disabled) svg { transform: translateX(1px) translateY(-1px); }

    /* ─── Error Toast ─── */
    #error-toast {
      display: none;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      padding: 10px 16px;
      background: rgba(220, 80, 80, 0.12);
      border: 1px solid rgba(220, 80, 80, 0.25);
      border-radius: 10px;
      font-size: 13px;
      color: #f08080;
      animation: fadeUp 0.3s ease both;
    }

    /* ═══════════════════════════════════════════
       FOOTER
    ═══════════════════════════════════════════ */
    footer {
      flex-shrink: 0;
      padding: 0 0 10px;
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.04em;
    }

    footer span { color: var(--accent-gold); opacity: 0.7; }

    /* ═══════════════════════════════════════════
       RESPONSIVE
    ═══════════════════════════════════════════ */
    @media (max-width: 600px) {
      #app { padding: 0 10px; }

      .brand-title  { font-size: 18px; }
      .brand-subtitle { display: none; }

      .bubble       { max-width: 82%; font-size: 14px; }
      #empty-state h2 { font-size: 21px; }
      .chip         { font-size: 12px; padding: 6px 13px; }
    }
  </style>
</head>

<body>
  <div id="app">

    <!-- ═══ HEADER ═══ -->
    <header>
      <div class="header-brand">
        <div class="brand-mark">✦</div>
        <div>
          <div class="brand-title">ConvoRAG</div>
          <div class="brand-subtitle">Conversation AI</div>
        </div>
      </div>
      <div class="header-status">
        <div class="status-dot"></div>
        Online
      </div>
    </header>

    <!-- ═══ CHAT WINDOW ═══ -->
    <div id="chat-window" role="log" aria-live="polite" aria-label="Chat conversation">

      <!-- Empty / welcome state -->
      <div id="empty-state">
        <div class="empty-orb">✦</div>
        <h2>How can I help<br><em>you today?</em></h2>
        <p>Ask anything about conversations. Specifically first 20 if you also want Persona</p>

      </div>

      <!-- Typing indicator (hidden by default) -->
      <div id="typing-row" role="status" aria-label="Bot is typing">
        <div class="avatar bot-avatar">✦</div>
        <div class="typing-bubble">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
      </div>

    </div><!-- /#chat-window -->

    <!-- ═══ INPUT AREA ═══ -->
    <div id="input-area">
      <div class="input-glass">
        <textarea
          id="user-input"
          rows="1"
          placeholder="Message ConvoRAG…"
          aria-label="Type your message"
          autocomplete="off"
          spellcheck="true"
        ></textarea>
        <button id="send-btn" aria-label="Send message" disabled>
          <!-- Paper-plane SVG icon -->
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>

      <!-- Error toast -->
      <div id="error-toast">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="12" y1="8" x2="12" y2="12"></line>
          <line x1="12" y1="16" x2="12.01" y2="16"></line>
        </svg>
        <span id="error-msg">Could not reach the server. Please try again.</span>
      </div>
    </div>

    <!-- ═══ FOOTER ═══ -->
    <footer>
      Powered by <span>ConvoRAG</span> · Built by ✦ Atharva
    </footer>

  </div><!-- /#app -->

  <!-- ═══════════════════════════════════════════
       JAVASCRIPT
  ═══════════════════════════════════════════ -->
  <script>
    /* ─── Config ─── */
    const API_ENDPOINT = 'http://localhost:8000/chat';
    const BOT_RESPONSE_DELAY_MS = 400;  // natural feel delay before reply appears

    /* ─── DOM refs ─── */
    const chatWindow  = document.getElementById('chat-window');
    const userInput   = document.getElementById('user-input');
    const sendBtn     = document.getElementById('send-btn');
    const typingRow   = document.getElementById('typing-row');
    const emptyState  = document.getElementById('empty-state');
    const errorToast  = document.getElementById('error-toast');
    const errorMsg    = document.getElementById('error-msg');

    /* ─── State ─── */
    let isBusy = false;  // prevents multiple simultaneous requests

    /* ──────────────────────────────────────────
       AUTO-RESIZE TEXTAREA
    ────────────────────────────────────────── */
    userInput.addEventListener('input', () => {
      // Enable/disable send button based on content
      const hasText = userInput.value.trim().length > 0;
      sendBtn.disabled = !hasText || isBusy;

      // Auto-resize up to 140px (CSS max-height)
      userInput.style.height = 'auto';
      userInput.style.height = userInput.scrollHeight + 'px';
    });

    /* ──────────────────────────────────────────
       KEYBOARD: Enter to send (Shift+Enter = newline)
    ────────────────────────────────────────── */
    userInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        if (!sendBtn.disabled) handleSend();
      }
    });

    sendBtn.addEventListener('click', handleSend);

    /* ──────────────────────────────────────────
       SUGGESTION CHIPS
    ────────────────────────────────────────── */
    function useChip(chipEl) {
      userInput.value = chipEl.textContent.trim();
      // Trigger input event to resize + enable send
      userInput.dispatchEvent(new Event('input'));
      userInput.focus();
    }

    /* ──────────────────────────────────────────
       MAIN SEND HANDLER
    ────────────────────────────────────────── */
    async function handleSend() {
      const text = userInput.value.trim();
      if (!text || isBusy) return;

      // ── Lock UI ──
      isBusy = true;
      sendBtn.disabled = true;
      hideError();

      // ── Hide empty state on first message ──
      if (emptyState) emptyState.remove();

      // ── Render user bubble ──
      appendMessage('user', text);

      // ── Clear input ──
      userInput.value = '';
      userInput.style.height = 'auto';

      // ── Show typing indicator ──
      showTyping();

      // ── Call API ──
      try {
        const botReply = await fetchReply(text);

        // Small delay for natural feel
        await sleep(BOT_RESPONSE_DELAY_MS);

        hideTyping();
        appendMessage('bot', botReply);

      } catch (err) {
        hideTyping();
        showError(err.message || 'Could not reach the server. Is it running?');
        // Append an error bubble in chat too
        appendMessage('bot', '⚠️ Sorry, I could not connect to the server. Please make sure it is running and try again.');
      }

      // ── Unlock UI ──
      isBusy = false;
      userInput.focus();
    }

    /* ──────────────────────────────────────────
       FETCH FROM FASTAPI BACKEND
    ────────────────────────────────────────── */
    async function fetchReply(query) {
      const res = await fetch(API_ENDPOINT, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query }),
      });

      if (!res.ok) {
        throw new Error(`Server responded with status ${res.status}`);
      }

      const data = await res.json();

      // Validate expected shape { "response": "..." }
      if (typeof data.response !== 'string') {
        throw new Error('Unexpected response format from server.');
      }

      return data.response;
    }

    /* ──────────────────────────────────────────
       APPEND MESSAGE BUBBLE
    ────────────────────────────────────────── */
    function appendMessage(role, text) {
      const isUser = role === 'user';

      /* Row */
      const row = document.createElement('div');
      row.className = `message-row ${isUser ? 'user' : 'bot'}`;

      /* Avatar */
      const avatar = document.createElement('div');
      avatar.className = `avatar ${isUser ? 'user-avatar' : 'bot-avatar'}`;
      avatar.textContent = isUser ? '◉' : '✦';

      /* Bubble wrapper */
      const wrap = document.createElement('div');
      wrap.className = 'bubble-wrap';

      /* Bubble */
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = text;   // safe: no innerHTML, avoids XSS

      /* Timestamp */
      const ts = document.createElement('div');
      ts.className = 'timestamp';
      ts.textContent = now();

      wrap.appendChild(bubble);
      wrap.appendChild(ts);

      row.appendChild(avatar);
      row.appendChild(wrap);

      // Insert before typing indicator
      chatWindow.insertBefore(row, typingRow);

      scrollToBottom();
    }

    /* ──────────────────────────────────────────
       TYPING INDICATOR
    ────────────────────────────────────────── */
    function showTyping() {
      typingRow.style.display = 'flex';
      scrollToBottom();
    }

    function hideTyping() {
      typingRow.style.display = 'none';
    }

    /* ──────────────────────────────────────────
       ERROR TOAST
    ────────────────────────────────────────── */
    function showError(msg) {
      errorMsg.textContent = msg;
      errorToast.style.display = 'flex';
    }

    function hideError() {
      errorToast.style.display = 'none';
    }

    /* ──────────────────────────────────────────
       UTILITIES
    ────────────────────────────────────────── */
    function scrollToBottom() {
      chatWindow.scrollTo({ top: chatWindow.scrollHeight, behavior: 'smooth' });
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function now() {
      return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    /* ── Focus input on load ── */
    userInput.focus();
  </script>
</body>
</html>
